name: Supabase DB Tests

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  db-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1

      - name: Start Supabase
        run: supabase start

      - name: Run pgTAP
        run: supabase test db supabase/tests/database
